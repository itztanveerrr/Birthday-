<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Jinti 🎂</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            color: #ff2e63;
            font-size: 28px;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #ff2e63;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #e6004c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Happy Birthday Jinti 🎂</h1>
    <p>May your day be filled with happiness, love, and endless smiles 💖</p>
    <button onclick="showMessage()">Click for Surprise 🎁</button>
</div>

<script>
function showMessage() {
    alert("Jinti, you are amazing! Happy Birthday 🎉💖");
}
</script>

</body>
</html>
