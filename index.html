<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Jinti 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
padding:0;
background:linear-gradient(135deg,#000428,#004e92);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
text-align:center;
overflow:hidden;
color:white;
}

/* Card */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
box-shadow:0 0 50px rgba(255,255,255,0.3);
max-width:350px;
animation:pop 1s ease-in-out;
}

h1{
color:#ffd700;
}

/* Button */
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ffd700;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Photo */
#photo{
display:none;
margin-top:15px;
max-width:100%;
border-radius:20px;
animation:fadeIn 1.5s ease-in-out;
}

/* Message */
#message{
display:none;
margin-top:15px;
font-weight:bold;
}

/* Animations */
@keyframes pop{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Flower */
.flower{
position:absolute;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100vh);}
100%{transform:translateY(100vh);}
}

/* Spark */
.spark{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
pointer-events:none;
animation:twinkle 1.5s infinite;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

</style>
</head>

<body>

<div class="card">
<h1>🎂 Happy Birthday Jinti 🎂</h1>

<p id="typing"></p>

<button onclick="start()">Open Surprise 🎁</button>

<img id="photo" src="IMG_20260228_191924.jpg">

<div id="message">
Wishing you happiness, success & beautiful moments 🌸✨
</div>

<audio id="music" loop>
<source src="video_20260228_233426_edit.mp4" type="audio/mp4">
</audio>

</div>

<script>

/* Typing Effect */
let text="May your life be filled with joy, peace and success ✨";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

/* Start Surprise */
function start(){

document.getElementById("photo").style.display="block";
document.getElementById("message").style.display="block";
document.getElementById("music").play();

createFlowers();
}

/* Auto Surprise After 5 Seconds */
setTimeout(()=>{
document.getElementById("photo").style.display="block";
document.getElementById("message").style.display="block";
document.getElementById("music").play();
createFlowers();
},5000);

/* Flower Rain */
function createFlowers(){
for(let i=0;i<60;i++){
let f=document.createElement("div");
f.classList.add("flower");
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(Math.random()*4+4)+"s";
document.body.appendChild(f);
}
}

/* Click Anywhere = Fireworks */
document.addEventListener("click",(e)=>{
let spark=document.createElement("div");
spark.classList.add("spark");
spark.style.left=e.clientX+"px";
spark.style.top=e.clientY+"px";
document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1000);
});

typeWriter();

</script>

</body>
</html>
