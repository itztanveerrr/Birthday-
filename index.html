<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Vontie Jinti 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
padding:0;
background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
text-align:center;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:350px;
}

h1{
color:#7b2cbf;
}

p{
color:#444;
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#7b2cbf;
color:white;
cursor:pointer;
margin-top:15px;
font-size:15px;
}

#photo{
display:none;
margin-top:15px;
max-width:100%;
border-radius:15px;
}

#message{
display:none;
margin-top:15px;
font-size:16px;
color:#7b2cbf;
font-weight:bold;
}

.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100vh);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="card">
<h1>Happy Birthday Vontie Jinti 🎂</h1>
<p>Tap below for a special surprise 💐</p>

<button onclick="nextStep()">Open Surprise 🎁</button>

<img id="photo" src="IMG_20260228_191924.jpg">

<div id="message">
Dear Vontie Jinti 🌸 <br>
You are a blessing to our family. <br>
May your life be filled with happiness, health, and success 🎉✨
</div>
</div>

<script>
let step=0;

function nextStep(){
step++;

if(step===1){
document.getElementById("photo").style.display="block";
}
else if(step===2){
document.getElementById("message").style.display="block";
}
else if(step===3){
createConfetti();
}
}

function createConfetti(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.classList.add("confetti");
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)";
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
}
}
</script>

</body>
</html>
